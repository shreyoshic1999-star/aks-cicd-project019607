name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Secret Values
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          echo "CLIENT_ID Length=${#CLIENT_ID}"
          echo "CLIENT_SECRET Length=${#CLIENT_SECRET}"
          echo "TENANT_ID Length=${#TENANT_ID}"
          echo "SUBSCRIPTION_ID Length=${#SUBSCRIPTION_ID}"

          echo "CLIENT_ID Prefix=${CLIENT_ID:0:5}"
          echo "CLIENT_SECRET Prefix=${CLIENT_SECRET:0:5}"
          echo "TENANT_ID Prefix=${TENANT_ID:0:5}"

      - name: Azure Login
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            --username "$CLIENT_ID" \
            --password "$CLIENT_SECRET" \
            --tenant "$TENANT_ID"

          az account set \
            --subscription "$SUBSCRIPTION_ID"

      - name: Verify Azure Login
        run: |
          az account show

      - name: Login to ACR
        run: |
          az acr login --name shreyoshiazurecicd

      - name: Build Docker Image
        run: |
          docker build -t shreyoshiazurecicd.azurecr.io/flask-app:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push shreyoshiazurecicd.azurecr.io/flask-app:${{ github.sha }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group azurecicd \
            --name aks-cluster \
            --overwrite-existing

      - name: Update Deployment
        run: |
          kubectl set image deployment/flask-app \
            flask-app=shreyoshiazurecicd.azurecr.io/flask-app:${{ github.sha }}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/flask-app

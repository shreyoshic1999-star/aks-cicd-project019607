name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Secret Length
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          python3 -c "
import os
print('CLIENT_ID Length =', len(os.environ['CLIENT_ID']))
print('CLIENT_SECRET Length =', len(os.environ['CLIENT_SECRET']))
print('TENANT_ID Length =', len(os.environ['TENANT_ID']))
print('SUBSCRIPTION_ID Length =', len(os.environ['SUBSCRIPTION_ID']))
"

      - name: Write Secret To File
        env:
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          printf "%s" "$CLIENT_SECRET" > secret.txt
          echo "Secret file size:"
          wc -c secret.txt

      - name: Azure Login
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            --username "$CLIENT_ID" \
            --password "$CLIENT_SECRET" \
            --tenant "$TENANT_ID"

          az account set \
            --subscription "$SUBSCRIPTION_ID"

      - name: Verify Azure Login
        run: |
          az account show

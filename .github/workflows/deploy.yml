name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >
            {
              "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Login to ACR
        run: |
          az acr login --name shreyoshiazurecicd

      - name: Build Docker Image
        run: |
          docker build -t shreyoshiazurecicd.azurecr.io/flask-app:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push shreyoshiazurecicd.azurecr.io/flask-app:${{ github.sha }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group azurecicd \
            --name aks-cluster \
            --overwrite-existing

      - name: Update Deployment
        run: |
          kubectl set image deployment/flask-app \
          flask-app=shreyoshiazurecicd.azurecr.io/flask-app:${{ github.sha }}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/flask-app
